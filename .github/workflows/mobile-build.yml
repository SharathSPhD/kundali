name: mobile-build

# Builds store-ready mobile artifacts from the Capacitor projects:
#  - Android: signed release AAB (Play Store upload format) + signed APK
#    (direct install / sideload), signed with the keystore in repo secrets.
#  - iOS: unsigned xcarchive — signing/upload requires an Apple Developer
#    account (see docs/MOBILE.md "Signing & submission").
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "mobile/**"
      - ".github/workflows/mobile-build.yml"

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install JS deps + sync Capacitor
        run: |
          npm ci
          npx cap sync android
      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
      - name: Build signed release AAB + APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon bundleRelease assembleRelease
      - name: Verify APK signature
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$BT/apksigner" verify --print-certs android/app/build/outputs/apk/release/app-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: kundali-android
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  ios-archive:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install JS deps + sync Capacitor
        run: |
          npm ci
          npx cap sync ios
      - name: Install CocoaPods deps
        working-directory: ios/App
        run: pod install
      - name: Build unsigned archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/Kundali.xcarchive" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Package archive
        run: |
          cd "$RUNNER_TEMP" && zip -qry Kundali.xcarchive.zip Kundali.xcarchive
      - uses: actions/upload-artifact@v4
        with:
          name: kundali-ios-unsigned-archive
          path: ${{ runner.temp }}/Kundali.xcarchive.zip
          if-no-files-found: error
