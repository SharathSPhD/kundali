name: play-publish

# One-click Google Play publication. Becomes operational the moment the
# PLAY_SERVICE_ACCOUNT_JSON secret exists (Play Console → Setup → API
# access → create a service account with "Release manager" role, download
# its JSON key, add it as that repo secret). Until then the guard step
# fails fast with instructions instead of half-running.
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track"
        type: choice
        default: internal
        options: [internal, alpha, beta, production]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check publishing credentials exist
        env:
          SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$SA" ]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON secret is not set. Create a Google Play Console account, add the app (com.technektar.kundali) with one manual AAB upload, create a service account under API access, and store its JSON key as this secret."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
      - name: Build signed AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          npm ci
          npx cap sync android
          cd android && ./gradlew --no-daemon bundleRelease
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.technektar.kundali
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed
