name: backend-tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyswisseph build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3-dev libsqlite3-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest -v
