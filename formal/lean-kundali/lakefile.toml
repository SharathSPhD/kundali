name = "kundali"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Kundali"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "Kundali"

[[lean_exe]]
name = "oracle"
root = "Oracle.Main"
